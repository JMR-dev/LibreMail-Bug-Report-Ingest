info:
  name: "admin: authenticated list of pending reports"
  # GET /v1/admin/reports with a valid Bearer token returns the pending ids.
  # Captures the first id into the `removeId` run variable for the remove test.
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/v1/admin/reports"
  headers:
    - name: Authorization
      value: "Bearer {{adminToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("authenticated list returns 200", function () {
          expect(res.getStatus()).to.equal(200);
        });
        test("body has status ok and a reports array", function () {
          expect(res.getBody().status).to.equal("ok");
          expect(res.getBody().reports).to.be.an("array");
        });
        test("at least one pending report is listed (the seed)", function () {
          expect(res.getBody().reports.length).to.be.at.least(1);
        });
        // Remember an id to remove in the next request.
        bru.setVar("removeId", res.getBody().reports[0]);
