info:
  name: 405 - non-POST method is rejected
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/v1/reports"

runtime:
  scripts:
    - type: tests
      code: |-
        test("a non-POST method returns 405", function () {
          expect(res.getStatus()).to.equal(405);
        });
        test("405 advertises the allowed method via the Allow header", function () {
          expect(res.getHeader("allow")).to.equal("POST");
        });
