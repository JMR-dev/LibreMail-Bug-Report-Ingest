info:
  name: "admin: removed report is excluded from the pending list"
  # Re-list after the remove: the removed id must no longer appear, proving it is
  # excluded from the next weekly publish run (the ticket's acceptance criterion).
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/v1/admin/reports"
  headers:
    - name: Authorization
      value: "Bearer {{adminToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("list returns 200", function () {
          expect(res.getStatus()).to.equal(200);
        });
        test("the removed id is no longer pending", function () {
          expect(res.getBody().reports).to.not.include(bru.getVar("removeId"));
        });
